name: build

# C1 — schone verificatie-build. Bewijst dat de app op een verse runner compileert
# en bouwt (geen dev-server, geen lint/coverage): tsc-typecheck + unit-tests + next build.
#
# LET OP (HANDOFF — repo-secrets vereist): `next build` draait generateStaticParams
# voor de SSG-widget-pagina's (`/widget/[slug]/[page]`), die Supabase queryt. Sinds de
# V0/V1-namespace-split (kickoff §3) heten de keys V0_* / V1_*. Zet in GitHub →
# Settings → Secrets and variables → Actions deze repo-secrets:
#   - V0_SUPABASE_URL
#   - V0_SUPABASE_SERVICE_ROLE_KEY   (V0-sandbox: alléén fake demo-data, geen prod-klantdata)
#   - NEXT_PUBLIC_V1_SUPABASE_URL    (nodig voor de /v1/login client-bundle vanaf PR-4)
#   - NEXT_PUBLIC_V1_SUPABASE_ANON_KEY
# Zonder de V0-secrets faalt de SSG-stap van de build. Zie HANDOFF.md.

on:
  push:
    branches: [main]
  pull_request:

# Eén build per branch/PR tegelijk; nieuwere push annuleert de lopende run.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install (clean)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # Unit-tests incl. de service-role/V0-V1 grep-gate (no-adhoc-service-client).
      # Draaide voorheen nergens automatisch — nu een harde merge-gate.
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run build
        env:
          V0_SUPABASE_URL: ${{ secrets.V0_SUPABASE_URL }}
          V0_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.V0_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_V1_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_V1_SUPABASE_URL }}
          NEXT_PUBLIC_V1_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_V1_SUPABASE_ANON_KEY }}
